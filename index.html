<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RP Archive</title>
<style>
body{margin:0;font-family:Arial;background:#f5f8fa;display:flex;height:100vh}

#menu{width:260px;background:#0f1419;color:white;overflow:auto;padding:10px}
.menuTitle{font-size:18px;margin:10px 0 5px 5px;color:#8899a6}
.menuItem{padding:8px;border-radius:6px;cursor:pointer}
.menuItem:hover{background:#1d9bf0}

#chatArea{flex:1;display:flex;flex-direction:column}

#messages{flex:1;overflow:auto;padding:20px}

.tweet{display:flex;margin-bottom:15px}
.avatar{width:48px;height:48px;border-radius:50%;margin-right:10px;object-fit:cover}

.name{font-weight:bold}
.id{color:#536471;margin-left:5px}
.date{color:#536471;font-size:12px}
.text{margin-top:3px;white-space:pre-line}

#inputArea{border-top:1px solid #ccc;padding:10px;display:flex;gap:10px}
#msg{flex:1}

#charSelect img{width:36px;height:36px;border-radius:50%;cursor:pointer}

#profile{position:fixed;right:0;top:0;width:300px;height:100%;background:white;border-left:1px solid #ccc;padding:20px;display:none;overflow:auto}

button{cursor:pointer}

</style>
</head>
<body>

<div id="menu">
<button onclick="addMenu()">+ 메뉴</button>
<div id="menuList"></div>
</div>

<div id="chatArea">

<div id="messages"></div>

<div id="inputArea">
<select id="char"></select>
<input id="msg" placeholder="채팅 입력">
<button onclick="sendMsg()">전송</button>
<button onclick="bulkUpload()">대화 업로드</button>
</div>

</div>

<div id="profile"></div>

<script>

let menus=JSON.parse(localStorage.getItem("menus")||"[]")
let chars=JSON.parse(localStorage.getItem("chars")||"[]")
let rooms=JSON.parse(localStorage.getItem("rooms")||"{}")
let currentRoom=null

function save(){
localStorage.setItem("menus",JSON.stringify(menus))
localStorage.setItem("chars",JSON.stringify(chars))
localStorage.setItem("rooms",JSON.stringify(rooms))
}

function renderMenus(){
const box=document.getElementById("menuList")
box.innerHTML=""

menus.forEach((m,mi)=>{

const title=document.createElement("div")
title.className="menuTitle"
title.textContent=m.name
box.appendChild(title)

m.rooms.forEach((r,ri)=>{

const d=document.createElement("div")
d.className="menuItem"
d.textContent=r

if(rooms[r] && rooms[r].new) d.textContent="🆕 "+r


d.onclick=()=>openRoom(r)

const del=document.createElement("button")
del.textContent="삭제"
del.onclick=(e)=>{
e.stopPropagation()
m.rooms.splice(ri,1)
delete rooms[r]
save()
renderMenus()
}

d.appendChild(del)

box.appendChild(d)

})

const add=document.createElement("button")
add.textContent="+방"
add.onclick=()=>{
const name=prompt("방 이름")
m.rooms.push(name)
rooms[name]=[]
save()
renderMenus()
}

box.appendChild(add)

})

}

function addMenu(){
const name=prompt("메뉴 이름")
menus.push({name:name,rooms:[]})
save()
renderMenus()
}

function openRoom(r){
currentRoom=r
if(rooms[r]) rooms[r].new=false
renderMenus()
renderMsgs()
}

function renderMsgs(){

const box=document.getElementById("messages")
box.innerHTML=""

(rooms[currentRoom]||[]).forEach((m,i)=>{

const d=document.createElement("div")
d.className="tweet"

const img=document.createElement("img")
img.className="avatar"
img.src=m.avatar
img.onclick=()=>showProfile(m.char)

const body=document.createElement("div")

body.innerHTML=`
<div>
<span class="name">${m.char}</span>
<span class="id">@${m.id}</span>
</div>
<div class="date">${m.date}</div>
<div class="text">${m.text}</div>
`

const edit=document.createElement("button")
edit.textContent="수정"
edit.onclick=()=>{
const t=prompt("수정",m.text)
m.text=t
save()
renderMsgs()
}

const del=document.createElement("button")
del.textContent="삭제"
del.onclick=()=>{
rooms[currentRoom].splice(i,1)
save()
renderMsgs()
}

body.appendChild(edit)
body.appendChild(del)


d.appendChild(img)
d.appendChild(body)

box.appendChild(d)

})

}

function sendMsg(){

const text=document.getElementById("msg").value
const c=chars[document.getElementById("char").value]

const date=new Date()

rooms[currentRoom].push({
char:c.name,
id:c.id,
avatar:c.avatar,
text:text,
date:`${date.getMonth()+1}월 ${date.getDate()}일`
})

save()
renderMsgs()

}

function bulkUpload(){

const raw=prompt("대화 전체 붙여넣기")

const blocks=raw.split("\n\n")

blocks.forEach(b=>{

const l=b.split("\n")

if(l.length>=4){

rooms[currentRoom].push({
char:l[0],
id:l[1].replace("@",""),
date:l[2],
text:l.slice(3).join("\n"),
avatar:findAvatar(l[0])

})

}

})

save()
renderMsgs()

}

function findAvatar(name){

const c=chars.find(c=>c.name==name)
return c?c.avatar:""

}

function showProfile(name){

const c=chars.find(c=>c.name==name)

const box=document.getElementById("profile")
box.style.display="block"

box.innerHTML=`
<h2>${c.name}</h2>
<img src="${c.avatar}" width="100">
<p>@${c.id}</p>
<textarea id="bio">${c.bio||""}</textarea>
<textarea id="rel">${c.rel||""}</textarea>
<button onclick="saveProfile('${c.name}')">저장</button>
<button onclick="deleteChar('${c.name}')">캐릭터 삭제</button>
`

}

function saveProfile(n){

const c=chars.find(c=>c.name==n)

c.bio=document.getElementById("bio").value
c.rel=document.getElementById("rel").value

save()

}

function deleteChar(n){
chars=chars.filter(c=>c.name!=n)
save()
loadChars()
}

function loadChars(){

const s=document.getElementById("char")
s.innerHTML=""

chars.forEach((c,i)=>{

const o=document.createElement("option")
o.value=i
o.textContent=c.name

s.appendChild(o)

})

}

function addChar(){

const name=prompt("캐릭터 이름")
const id=prompt("캐릭터 아이디")

const input=document.createElement("input")
input.type="file"

input.onchange=e=>{

const reader=new FileReader()

reader.onload=()=>{

chars.push({name:name,id:id,avatar:reader.result})
save()
loadChars()

}

reader.readAsDataURL(e.target.files[0])

}

input.click()

}

loadChars()
renderMenus()

</script>
</body>
</html>
